_format_version: "3.0"
_transform: true
services:
  - name: user-service
    url: http://host.docker.internal:3012
    routes:
      - name: user-routes
        paths:
          - /user
        strip_path: true
        plugins:
          - name: cors
            config:
              origins:
                - http://localhost:3000
              methods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS
              headers:
                - Authorization
                - Content-Type
              credentials: true
  - name: product-service
    url: http://host.docker.internal:3001
    routes:
      - name: product-routes
        paths:
          - /product
        strip_path: true
        plugins:
          - name: rate-limiting
            config:
              minute: 60
          - name: cors
            config:
              origins:
                - http://localhost:3000
  - name: order-service
    url: http://host.docker.internal:3002
