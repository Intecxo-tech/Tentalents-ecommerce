helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true

repositories:
  # Add repos if needed for charts like Postgres, Redis, MinIO, etc.
  # - name: bitnami
  #   url: https://charts.bitnami.com/bitnami

releases:
  - name: user-service
    namespace: user-service
    chart: ./infra/helm/microservices/user-service
    values:
      - ./infra/helm/microservices/user-service/values.yaml

  - name: product-service
    namespace: product-service
    chart: ./infra/helm/microservices/product-service
    values:
      - ./infra/helm/microservices/product-service/values.yaml

  - name: order-service
    namespace: order-service
    chart: ./infra/helm/microservices/order-service
    values:
      - ./infra/helm/microservices/order-service/values.yaml

  - name: rating-service
    namespace: rating-service
    chart: ./infra/helm/microservices/rating-service
    values:
      - ./infra/helm/microservices/rating-service/values.yaml

  - name: email-service
    namespace: email-service
    chart: ./infra/helm/microservices/email-service
    values:
      - ./infra/helm/microservices/email-service/values.yaml

  - name: payment-service
    namespace: payment-service
    chart: ./infra/helm/microservices/payment-service
    values:
      - ./infra/helm/microservices/payment-service/values.yaml

  - name: search-service
    namespace: search-service
    chart: ./infra/helm/microservices/search-service
    values:
      - ./infra/helm/microservices/search-service/values.yaml

  - name: cart-service
    namespace: cart-service
    chart: ./infra/helm/microservices/cart-service
    values:
      - ./infra/helm/microservices/cart-service/values.yaml

  - name: admin-service
    namespace: admin-service
    chart: ./infra/helm/microservices/admin-service
    values:
      - ./infra/helm/microservices/admin-service/values.yaml

  - name: invoice-service
    namespace: invoice-service
    chart: ./infra/helm/microservices/invoice-service
    values:
      - ./infra/helm/microservices/invoice-service/values.yaml

  - name: analytics-service
    namespace: analytics-service
    chart: ./infra/helm/microservices/analytics-service
    values:
      - ./infra/helm/microservices/analytics-service/values.yaml

  - name: vendor-service
    namespace: vendor-service
    chart: ./infra/helm/microservices/vendor-service
    values:
      - ./infra/helm/microservices/vendor-service/values.yaml



# Optional commands for Helmfile workflow
# helmfile -f helmfile.yaml repos
# helmfile -f helmfile.yaml lint
# helmfile -f helmfile.yaml apply
# helmfile -f helmfile.yaml template
# helmfile -f helmfile.yaml destroy
microservices/vendor-service/values.yaml

# Optional commands for Helmfile workflow
# Add/update Helm repos (if any)
# helmfile -f helmfile-microservices.yaml repos

# Lint all charts
# helmfile -f helmfile-microservices.yaml lint

# Sync (install/upgrade) all microservices releases
# helmfile -f helmfile-microservices.yaml apply

# Template render all charts (dry-run)
# helmfile -f helmfile-microservices.yaml template

# Destroy all releases (uninstall)
# helmfile -f helmfile-microservices.yaml destroy
