      context: .
      dockerfile: apps/backend/vendor-service/Dockerfile
    container_name: vendor-service
    env_file:
      - .env
    ports:
      - "${VENDOR_SERVICE_PORT}:3011"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

volumes:
  pgdata:
  redis-data:
  minio-data:

networks:
  backend:
    driver: bridge
  microservices:
    driver: bridge

# ─── Useful Commands ────────────────────────────────

# Build all services
# npx nx run-many --target=build --all && docker compose --env-file .env up -d --build

# ─── All Services ────────────────────────────────

# # Start all services (detached)
# docker compose --env-file .env up -d

# # Stop all services
# docker compose down

# # Stop all services and remove volumes
# docker compose down -v

# # Check status of running containers
# docker compose ps

# # Tail logs of all services
# docker compose --env-file .env logs -f

# # Rebuild and restart all services
# docker compose --env-file .env up -d --build

