services:
  # ─── Infrastructure Services ────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - backend

  kafka:
    image: bitnami/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    networks:
      - backend

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SWAGGER_JSON_URL: ${SWAGGER_JSON_URL}
    ports:
      - "8080:8080"
    networks:
      - backend

  # ─── Microservices ────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: apps/backend/user-service/Dockerfile
    container_name: user-service
    env_file:
      - .env
    ports:
      - "${USER_SERVICE_PORT}:3012"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  product-service:
    build:
      context: .
      dockerfile: apps/backend/product-service/Dockerfile
    container_name: product-service
    env_file:
      - .env
    ports:
      - "${PRODUCT_SERVICE_PORT}:3001"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  order-service:
    build:
      context: .
      dockerfile: apps/backend/order-service/Dockerfile
    container_name: order-service
    env_file:
      - .env
    ports:
      - "${ORDER_SERVICE_PORT}:3002"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  rating-service:
    build:
      context: .
      dockerfile: apps/backend/rating-service/Dockerfile
    container_name: rating-service
    env_file:
      - .env
    ports:
      - "${RATING_SERVICE_PORT}:3003"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  email-service:
