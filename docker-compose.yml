      context: .
      dockerfile: apps/backend/analytics-service/Dockerfile
    container_name: analytics-service
    env_file:
      - .env
    ports:
      - "${ANALYTICS_SERVICE_PORT}:3010"
    networks:
      - microservices
    depends_on:
      - postgres
