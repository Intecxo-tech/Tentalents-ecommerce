version: '3.9'

services:
  # User Service
  user-service:
    build:
      context: ./apps/backend/user-service
    container_name: user-service
    ports:
      - "3012:3012"
    env_file:
      - ./apps/backend/user-service/.env
    depends_on:
      - postgres
      - kafka
      - redis
      - minio
    networks:
      - backend

  # Product Service
  product-service:
    build:
      context: ./apps/backend/product-service
    container_name: product-service
    ports:
      - "3001:3001"
    env_file:
      - ./apps/backend/product-service/.env
    depends_on:
      - postgres
      - kafka
    networks:
      - backend

  # Order Service
  order-service:
    build:
      context: ./apps/backend/order-service
    container_name: order-service
    ports:
      - "3002:3002"
    env_file:
      - ./apps/backend/order-service/.env
    depends_on:
      - postgres
      - kafka
    networks:
      - backend

  # Rating Service
  rating-service:
    build:
      context: ./apps/backend/rating-service
    container_name: rating-service
    ports:
      - "3003:3003"
    env_file:
      - ./apps/backend/rating-service/.env
    depends_on:
      - postgres
    networks:
      - backend

  # Email Service
  email-service:
    build:
      context: ./apps/backend/email-service
    container_name: email-service
    ports:
      - "3004:3004"
    env_file:
      - ./apps/backend/email-service/.env
    depends_on:
      - kafka
    networks:
      - backend

  # Payment Service
  payment-service:
    build:
      context: ./apps/backend/payment-service
    container_name: payment-service
    ports:
      - "3005:3005"
    env_file:
      - ./apps/backend/payment-service/.env
    depends_on:
      - postgres
      - kafka
    networks:
      - backend

  # Search Service
  search-service:
    build:
      context: ./apps/backend/search-service
    container_name: search-service
    ports:
      - "3006:3006"
    env_file:
      - ./apps/backend/search-service/.env
    networks:
      - backend

  # Cart Service
  cart-service:
    build:
      context: ./apps/backend/cart-service
    container_name: cart-service
    ports:
      - "3020:3020"
    env_file:
      - ./apps/backend/cart-service/.env
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  # Admin Service
  admin-service:
    build:
      context: ./apps/backend/admin-service
    container_name: admin-service
    ports:
      - "3008:3008"
    env_file:
      - ./apps/backend/admin-service/.env
    depends_on:
      - postgres
      - kafka
    networks:
      - backend

  # Invoice Service
  invoice-service:
    build:
      context: ./apps/backend/invoice-service
    container_name: invoice-service
    ports:
      - "3009:3009"
    env_file:
      - ./apps/backend/invoice-service/.env
    depends_on:
      - postgres
      - kafka
      - minio
    networks:
      - backend

  # Analytics Service
  analytics-service:
    build:
      context: ./apps/backend/analytics-service
    container_name: analytics-service
    ports:
      - "3010:3010"
    env_file:
      - ./apps/backend/analytics-service/.env
    depends_on:
      - postgres
      - kafka
    networks:
      - backend

  # Vendor Service
  vendor-service:
    build:
      context: ./apps/backend/vendor-service
    container_name: vendor-service
    ports:
      - "3011:3011"
    env_file:
      - ./apps/backend/vendor-service/.env
    depends_on:
      - postgres
      - kafka
    networks:
      - backend

  # Core Infra
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    command: server /data
    networks:
      - backend

volumes:
  postgres_data:
  minio_data:

networks:
  backend:
    driver: bridge



# # 1. Build all services
# docker-compose -f docker-compose-microservices.yml build

# # 2. Start all services in detached mode
# docker-compose -f docker-compose-microservices.yml up -d

# # 3. View running containers
# docker ps

# # 4. Check logs (for a specific service, e.g., invoice-service)
# docker-compose -f docker-compose-microservices.yml logs -f invoice-service

# # 5. Restart all services
# docker-compose -f docker-compose-microservices.yml restart

# # 6. Stop all services
# docker-compose -f docker-compose-microservices.yml down
