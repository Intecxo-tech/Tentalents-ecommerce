      context: .
      dockerfile: apps/backend/email-service/Dockerfile
    container_name: email-service
    env_file:
      - .env
    ports:
      - "${EMAIL_SERVICE_PORT}:3004"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  payment-service:
    build:
      context: .
      dockerfile: apps/backend/payment-service/Dockerfile
    container_name: payment-service
    env_file:
      - .env
    ports:
      - "${PAYMENT_SERVICE_PORT}:3005"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  search-service:
    build:
      context: .
      dockerfile: apps/backend/search-service/Dockerfile
    container_name: search-service
    env_file:
      - .env
    ports:
      - "${SEARCH_SERVICE_PORT}:3006"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  cart-service:
    build:
      context: .
      dockerfile: apps/backend/cart-service/Dockerfile
    container_name: cart-service
    env_file:
      - .env
    ports:
      - "${CART_SERVICE_PORT}:3020"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  admin-service:
    build:
      context: .
      dockerfile: apps/backend/admin-service/Dockerfile
    container_name: admin-service
    env_file:
      - .env
    ports:
      - "${ADMIN_SERVICE_PORT}:3008"
    networks:
      - microservices
    depends_on:
      - postgres
      - redis
      - kafka
      - minio

  invoice-service:
    build:
      context: .
      dockerfile: apps/backend/invoice-service/Dockerfile
    container_name: invoice-service
    env_file:
      - .env
    ports:
      - "${INVOICE_SERVICE_PORT}:3009"
    networks:
      - microservices
    depends_on:
      - postgres
